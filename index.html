<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimePath | Join the Route</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 font-sans">

    <div id="app" class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-gray-100">
        <div id="step1">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-blue-600 tracking-tighter italic">PrimePath</h1>
                <p class="text-gray-400 font-bold mt-1 uppercase text-[10px] tracking-[0.2em]">NMU Campus Connect</p>
            </div>

            <form id="regForm" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="STU" class="hidden peer" checked>
                        <div class="p-4 border-2 rounded-2xl peer-checked:border-blue-600 peer-checked:bg-blue-50 text-center transition-all">
                            <span class="block font-bold text-gray-700">Student</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="DRI" class="hidden peer">
                        <div class="p-4 border-2 rounded-2xl peer-checked:border-blue-600 peer-checked:bg-blue-50 text-center transition-all">
                            <span class="block font-bold text-gray-700">Driver</span>
                        </div>
                    </label>
                </div>

                <div class="space-y-3">
                    <input type="text" id="fullName" placeholder="Full Name" required class="w-full px-5 py-4 rounded-xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="studentNo" placeholder="Student or License No" required class="w-full px-5 py-4 rounded-xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <button type="button" onclick="goToPlans()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">
                    NEXT: SELECT PLAN
                </button>
            </form>
        </div>

        <div id="step2" class="hidden">
            <h2 class="text-xl font-black text-gray-800 mb-6">Choose Your Pack</h2>
            <div class="space-y-3 mb-8">
                <label class="block p-4 border rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-gray-200">
                    <input type="radio" name="plan" value="1" class="mr-2" checked> <b>Single Trip</b> - R25
                </label>
                <label class="block p-4 border rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-gray-200">
                    <input type="radio" name="plan" value="5" class="mr-2"> <b>5-Trip Pack</b> - R125
                </label>
                <label class="block p-4 border rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-gray-200">
                    <input type="radio" name="plan" value="10" class="mr-2"> <b>Weekly (10 Trips)</b> - R250
                </label>
                <label class="block p-4 border rounded-2xl cursor-pointer hover:bg-blue-50 transition-all border-gray-200">
                    <input type="radio" name="plan" value="40" class="mr-2"> <b>Monthly (40 Trips)</b> - R1000
                </label>
            </div>
            <button onclick="submitAll()" class="w-full bg-green-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-green-700 transition-all">
                FINISH & PAY
            </button>
        </div>
    </div>

    <script>
    // 1. Initialize Supabase ONCE (Make sure these are the correct keys!)
    const SB_URL = 'https://jcubwlutixqtbrabaucn.supabase.co/rest/v1/';
    const SB_KEY = 'sb_publishable_bgeZOuPQeOB5o8iM2YPwhw_p0N-3dGv';
    
    // We use 'sb' as a short name to avoid "already declared" conflicts
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // 2. The Navigation Function
    // We define it clearly so the button can find it
    window.goToPlans = function() {
        console.log("Navigating to plans...");
        const name = document.getElementById('fullName').value;
        const sn = document.getElementById('studentNo').value;

        if (!name || !sn) {
            alert("Please fill in your details first!");
            return;
        }

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    };

    // 3. The Submit Function
    window.submitAll = async function() {
        const fullName = document.getElementById('fullName').value;
        const role = document.querySelector('input[name="role"]:checked').value;
        const studentNo = document.getElementById('studentNo').value;
        const plan = document.querySelector('input[name="plan"]:checked');
        const credits = (role === 'STU' && plan) ? plan.value : 0;

        console.log("Submitting to Supabase...");

        const { data, error } = await sb.from('profiles').insert([{
            full_name: fullName,
            role: role,
            student_or_license_no: studentNo,
            credits: parseInt(credits)
        }]).select();

        if (error) {
            alert("Error: " + error.message);
        } else {
            localStorage.setItem('primepath_user_id', data[0].id);
            window.location.href = "dashboard.html";
        }
    };
</script>
